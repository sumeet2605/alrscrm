name: Deploy UAT

on:
  push:
    branches:
      - uat

concurrency:
  group: deploy-uat
  cancel-in-progress: false

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Run backend tests
        run: pytest backend/tests

  frontend-tests-and-build:
    name: Frontend tests and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm run test

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  deploy:
    name: Deploy to DigitalOcean UAT
    runs-on: ubuntu-latest
    needs:
      - backend-tests
      - frontend-tests-and-build
    environment: uat
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          DO_HOST: ${{ secrets.DO_HOST }}
          DO_SSH_KEY: ${{ secrets.DO_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DO_SSH_KEY" > ~/.ssh/do_uat_key
          chmod 600 ~/.ssh/do_uat_key
          ssh-keyscan -H "$DO_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on droplet
        env:
          DO_HOST: ${{ secrets.DO_HOST }}
          DO_USER: ${{ secrets.DO_USER }}
          DO_APP_PATH: ${{ secrets.DO_APP_PATH }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/do_uat_key "$DO_USER@$DO_HOST" "DO_APP_PATH='$DO_APP_PATH' bash -se" <<'REMOTE'
          set -euo pipefail

          cd "$DO_APP_PATH"

          git pull --ff-only
          if [ -z "${BACKEND_ENV_FILE:-}" ]; then
            if [ -f backend/.env.uat ]; then
              export BACKEND_ENV_FILE=backend/.env.uat
            elif [ -f backend/.env ]; then
              export BACKEND_ENV_FILE=backend/.env
            elif [ -f .env ]; then
              export BACKEND_ENV_FILE=.env
            else
              export BACKEND_ENV_FILE=backend/.env.uat
            fi
          fi
          if [ ! -f "$BACKEND_ENV_FILE" ]; then
            echo "Missing UAT backend env file: $BACKEND_ENV_FILE"
            echo "Create it from backend/.env.example and set STORAGE_PROVIDER=spaces with DO_SPACES_* values."
            exit 1
          fi
          if ! grep -Eq '^STORAGE_PROVIDER="?((spaces)|(digitalocean)|(do_spaces))"?$' "$BACKEND_ENV_FILE"; then
            echo "UAT backend env file must set STORAGE_PROVIDER=spaces, digitalocean, or do_spaces."
            exit 1
          fi
          require_env_value() {
            name="$1"
            value="$(awk -F= -v key="$name" '$1 == key {print substr($0, index($0, "=") + 1)}' "$BACKEND_ENV_FILE" | tail -n 1)"
            value="$(printf '%s' "$value" | sed -e 's/^"//' -e 's/"$//' -e "s/^'//" -e "s/'$//")"
            if [ -z "$value" ]; then
              echo "UAT backend env file is missing required value: $name"
              exit 1
            fi
          }
          require_env_value DO_SPACES_REGION
          require_env_value DO_SPACES_BUCKET
          require_env_value DO_SPACES_ACCESS_KEY
          require_env_value DO_SPACES_SECRET_KEY
          require_env_value SECRET_KEY
          require_env_value JWT_SECRET_KEY
          require_env_value INTEGRATION_ENCRYPTION_KEY
          docker compose down
          if ! docker compose up -d --build; then
            echo "Docker Compose startup failed. API logs:"
            docker compose logs api --tail=500 || true
            docker compose ps || true
            exit 1
          fi
          docker compose exec -T api alembic upgrade head

          echo "Waiting for UAT services to become healthy..."
          sleep 15

          check_health() {
            curl -fsS "http://127.0.0.1/health/live" >/dev/null &&
            curl -fsS "http://127.0.0.1/health/ready" >/dev/null
          }

          check_api_health() {
            curl -fsS "http://127.0.0.1:8000/health/live" >/dev/null &&
            curl -fsS "http://127.0.0.1:8000/health/ready" >/dev/null
          }

          for attempt in $(seq 1 30); do
            if check_health || check_api_health; then
              echo "UAT health checks passed."
              exit 0
            fi
            echo "Health checks not ready yet; retry ${attempt}/30..."
            sleep 5
          done

          echo "UAT health checks failed."
          docker compose ps
          docker compose logs api --tail=500
          exit 1
          REMOTE
